<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubito</title>
    <link rel="stylesheet" href="css/index.css">
    <script defer src="js/index.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css" rel="stylesheet">
</head>

<body id="body">
    <div id="cubito"></div>
    <div class="bottom">
        <div class="btns">
            <button id="stop" class="left"> <i class="ri-pause-line"></i> </button>
            <button id="play" class="right"> <i class="ri-play-line"></i> </button>
        </div>
        <div class="speed">
            <button id="1x" class="speed__btn left">1x</button>
            <button id="2x" class="speed__btn">2x</button>
            <button id="4x" class="speed__btn right">4x</button>
        </div>
    </div>
</body>

</html>
