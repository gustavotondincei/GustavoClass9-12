<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="css/index.css">
    <script defer src="js/index.js"></script>
</head>
<body>
    <section>
        <div class="calc">
            <input type="text" class="calc__result">
            <div class="calc__btns">
                <button onclick="clearDisplay()" class="top">C</button>
                <button onclick="setOperator('+-')" class="top">+/-</button>
                <button onclick="setOperator('%')" class="top">%</button>
                <button onclick="setOperator('/')" class="orange">/</button>

                <button onclick="setNumber('7')" class="number">7</button>
                <button onclick="setNumber('8')" class="number">8</button>
                <button onclick="setNumber('9')" class="number">9</button>
                <button onclick="setOperator('*')" class="orange">*</button>
                
                <button onclick="setNumber('4')" class="number">4</button>
                <button onclick="setNumber('5')" class="number">5</button>
                <button onclick="setNumber('6')" class="number">6</button>
                <button onclick="setOperator('-')" class="orange">-</button>
                
                <button onclick="setNumber('1')" class="number">1</button>
                <button onclick="setNumber('2')" class="number">2</button>
                <button onclick="setNumber('3')" class="number">3</button>
                <button onclick="setOperator('*')" class="orange">*</button>
                
                <button onclick="setNumber('0')" class="number zero bottomleft">0</button>
                <button onclick="setNumber(',')" class="number">,</button>
                <button onclick="calculate()" class="orange bottomright">=</button>
            </div>
        </div>
    </section>
</body>
</html>
