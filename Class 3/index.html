<!DOCTYPE html>
<!--Se puede hacer todo el código base simplemente digitando "!" y apretando enter-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 3</title>
</head>

<body>
    <!--Titulares-->
    <h1>Títular 1</h1>
    <h2>Títular 2</h2>
    <h3>Títular 3</h3>
    <h4>Títular 4</h4>
    <h5>Títular 5</h5>
    <h6>Títular 6</h6>
    <!--paragrafo-->
    <p>Lorem ipsum dolor sit amet</p>
    <!--Enlaces-->
    <a href="https://www.google.com/">Pincha aquí</a>
    <!--imagen-->
    <img src="https://images.ctfassets.net/denf86kkcx7r/4IPlg4Qazd4sFRuCUHIJ1T/f6c71da7eec727babcd554d843a528b8/gatocomuneuropeo-97">
    <!--contenedores-->
    <div></div>

    <!--header-->
    <header></header>
    <!--menu navegación-->
    <nav></nav>
    <!--contenido principal-->
    <main></main>
    <!--secciones-->
    <section></section>
    <!--articulos(como mini páginas completas)-->
    <article></article>
    <!--contenidos laterales(sidebar)-->
    <aside></aside>
    <!--footer-->
    <footer></footer>

    <!--como un div para aplicar estilos, pero se puede aplicar al medio de un paragrafro por ejemplo-->
    <span></span>
    
    <!--Listas-->
    <ul> <!--lista no ordenada(puntos)-->
        <li>item 1</li> <!--cada li es un iten de una lista-->
        <li>item 2</li>
    </ul>

    <ol> <!--lista ordenada(numeros)-->
        <li>item 1</li>
        <li>item 2</li>
    </ol>


</body>
</html>
