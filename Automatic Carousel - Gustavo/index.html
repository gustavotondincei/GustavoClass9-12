<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotador Simple</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="js/index.js"></script>
</head>
<body>
    <div class="top">
        <form action="#" method="post">
            <label for="url" style="display: none;">Url</label>
            <input type="url" id="url" placeholder="+ url">
        
            <button id="uploadImage">Subir imagen</button>
        </form>
    </div>
    
    <div class="app">
        <div class="image-container">
            <i class="ri-pause-fill"></i>
            <img id="imagen-rotativa" src="media/img1.png" alt="Imagen Rotativa">
        </div>
    </div>
</body>
</html>
